<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Desa Ambokulon</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <!-- SheetJS Library untuk Export Excel -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <style>
    /* Admin Specific Styles */
    .container-admin { 
      max-width: 1200px; 
      margin: -50px auto 50px; 
      padding: 0 20px; 
    }
    
    .card-admin { 
      background: white; 
      padding: 30px; 
      border-radius: 15px; 
      box-shadow: var(--shadow-card); 
      overflow-x: auto; 
    }
    
    table { 
      width: 100%; 
      border-collapse: collapse; 
      margin-top: 20px; 
      font-size: 14px; 
    }
    
    th { 
      background: var(--primary); 
      color: white; 
      padding: 12px; 
      text-align: left; 
      font-weight: 600;
      white-space: nowrap; /* Mencegah header wrap */
    }
    
    td { 
      padding: 12px; 
      border-bottom: 1px solid #eee; 
      vertical-align: middle;
    }
    
    tr:hover {
      background-color: #f8fafc;
    }
    
    .badge { 
      padding: 5px 10px; 
      border-radius: 5px; 
      font-size: 12px; 
      font-weight: bold; 
      display: inline-block;
    }
    
    .bg-pending { 
      background: #fef3c7; 
      color: #92400e; 
    }
    
    .btn-print { 
      background: #1e3a8a; 
      color: white;
      padding: 5px 10px; 
      font-size: 12px; 
      width: auto; 
      display: inline-block;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-right: 5px;
    }
    
    .btn-print:hover { 
      background: #1e40af; 
    }
    
    .btn-delete { 
      background: #dc2626; 
      color: white;
      padding: 5px 10px; 
      font-size: 12px; 
      width: auto; 
      display: inline-block;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    
    .btn-delete:hover { 
      background: #b91c1c; 
    }
    
    .btn-export {
      background: #059669;
      color: white;
      padding: 8px 15px;
      font-size: 13px;
      width: auto;
      display: inline-block;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 600;
    }
    
    .btn-export:hover {
      background: #047857;
      transform: translateY(-2px);
      box-shadow: 0 4px 6px rgba(5, 150, 105, 0.2);
    }
    
    .stats-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .stat-card {
      background: linear-gradient(135deg, var(--primary), #1e40af);
      color: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }
    
    .stat-number {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 5px;
    }
    
    .stat-label {
      font-size: 14px;
      opacity: 0.9;
    }
    
    .stat-card h2 {
      font-size: 1.2rem;
      word-wrap: break-word;
      white-space: normal;
      line-height: 1.4;
      margin-top: 5px;
    }
    
    .no-data {
      text-align: center;
      padding: 40px;
      color: #666;
    }
    
    .action-buttons {
      display: flex;
      gap: 5px;
    }
    
    /* 🔥 SEARCH BAR STYLE */
    .search-container {
      margin: 20px 0;
      display: flex;
      gap: 10px;
    }
    
    .search-input {
      flex: 1;
      padding: 12px 15px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      outline: none;
      font-size: 14px;
      transition: all 0.3s;
    }
    
    .search-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
    }
    
    .name-column {
      text-transform: capitalize; /* Auto Title Case */
      font-weight: 600;
    }
    
    code {
      background: #f1f5f9;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
    }
    
    /* Responsive Table */
    @media (max-width: 768px) {
      table {
        font-size: 12px;
      }
      
      th, td {
        padding: 8px 5px;
      }
      
      .action-buttons {
        flex-direction: column;
      }
      
      .btn-print, .btn-delete {
        width: 100%;
        margin: 2px 0;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>🔐 PANEL ADMIN DESA</h1>
  <p>Manajemen Pengajuan Surat Digital - Desa Ambokulon</p>
</header>

<div class="container-admin">
  <div class="card-admin">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h3>📋 Daftar Pengajuan Surat</h3>
        <div style="display: flex; gap: 10px;">
            <button onclick="exportToExcel()" class="btn-export" title="Download Excel">
                📊 Export Excel
            </button>
            <button onclick="loadData()" style="width: auto; padding: 8px 15px; font-size: 13px;">🔄 Refresh Data</button>
        </div>
    </div>
    
    <!-- Statistics Cards -->
    <div class="stats-container">
      <div class="stat-card">
        <div class="stat-number" id="totalSurat">0</div>
        <div class="stat-label">Total Surat</div>
      </div>
      <div class="stat-card" style="background: linear-gradient(135deg, #059669, #10b981);">
        <div class="stat-number" id="suratHariIni">0</div>
        <div class="stat-label">Hari Ini</div>
      </div>
      <div class="stat-card" style="background: linear-gradient(135deg, #7c3aed, #8b5cf6);">
        <div class="stat-number" id="jenisSuratTerbanyak">-</div>
        <div class="stat-label">Jenis Terbanyak</div>
      </div>
    </div>
    
    <!-- 🔥 SEARCH BAR -->
    <div class="search-container">
      <input type="text" id="searchInput" class="search-input" placeholder="🔍 Cari berdasarkan Nama, NIK, atau Nomor Surat..." onkeyup="filterTable()">
    </div>
    
    <!-- Data Table -->
    <table id="tabelPengajuan">
      <thead>
        <tr>
          <th>No</th>
          <th>Tgl Pengajuan</th>
          <th>No. Surat</th>
          <th>Nama Pemohon</th>
          <th>NIK</th>
          <th>Jenis Surat</th>
          <th>Keperluan</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="listData">
        <!-- Data will be loaded here -->
      </tbody>
    </table>
    
    <div id="noDataMessage" class="no-data" style="display: none;">
      <p>📭 Belum ada data pengajuan surat</p>
    </div>
  </div>
</div>

<script>
  // 🔥 AUTO-DETECT BASE URL (LOCALHOST ATAU PRODUCTION)
  const API_URL = window.location.origin;

  // 🔐 Simple Password Protection
  const pass = prompt("🔐 Masukkan Password Admin:");
  if (pass !== "admin123") {
    alert("❌ Akses Ditolak! Password salah.");
    window.location.href = "index.html";
  }

  // 🔥 HELPER: Format Title Case
  function toTitleCase(str) {
    return str.replace(/\w\S*/g, function(txt) {
      return txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase();
    });
  }

  async function loadData() {
    try {
      const res = await fetch(`${API_URL}/pengajuan/admin/list`);
      const data = await res.json();
      const list = document.getElementById("listData");
      const noDataMsg = document.getElementById("noDataMessage");
      const table = document.getElementById("tabelPengajuan");
      
      list.innerHTML = "";
      
      // Update statistics
      updateStats(data);

      if (data.length === 0) {
        noDataMsg.style.display = "block";
        table.style.display = "none";
        return;
      } else {
        noDataMsg.style.display = "none";
        table.style.display = "table";
      }

      data.forEach((item, index) => {
        const tgl = new Date(item.tanggal).toLocaleDateString('id-ID', {
          day: 'numeric',
          month: 'short',
          year: 'numeric'
        });
        
        const nikFormatted = item.nik.replace(/(\d{4})(\d{4})(\d{4})(\d{4})/, '$1-$2-$3-$4');
        
        list.innerHTML += `
          <tr>
            <td>${index + 1}</td>
            <td>${tgl}</td>
            <td><b>${item.nomor_surat || '-'}</b></td>
            <td class="name-column">${toTitleCase(item.nama)}</td>
            <td><code>${nikFormatted}</code></td>
            <td><span class="badge bg-pending">${item.jenis_surat}</span></td>
            <td>${item.keperluan || '-'}</td>
            <td>
              <div class="action-buttons">
                <button class="btn-print" onclick="cetakSurat(${item.id})" title="Cetak Surat">
                  🖨️ Cetak
                </button>
                <button class="btn-delete" onclick="hapusData(${item.id})" title="Hapus Data">
                  🗑️ Hapus
                </button>
              </div>
            </td>
          </tr>
        `;
      });
    } catch (err) {
      console.error("Error loading data:", err);
      alert("❌ Gagal mengambil data. Pastikan server sudah berjalan.");
    }
  }
  
  function updateStats(data) {
    // Total Surat
    document.getElementById("totalSurat").textContent = data.length;
    
    // Surat Hari Ini
    const today = new Date().toDateString();
    const todayCount = data.filter(item => new Date(item.tanggal).toDateString() === today).length;
    document.getElementById("suratHariIni").textContent = todayCount;
    
    // Jenis Surat Terbanyak
    if (data.length > 0) {
      const jenisCount = {};
      data.forEach(item => {
        jenisCount[item.jenis_surat] = (jenisCount[item.jenis_surat] || 0) + 1;
      });
      
      const terbanyak = Object.keys(jenisCount).reduce((a, b) => 
        jenisCount[a] > jenisCount[b] ? a : b
      );
      
      // Shorten long names with smart truncation
      const shortName = terbanyak.length > 25 ? terbanyak.substring(0, 25) + '...' : terbanyak;
      document.getElementById("jenisSuratTerbanyak").textContent = shortName;
    }
  }

  // 🔥 FILTER TABLE FUNCTION (SEARCH)
  function filterTable() {
    const input = document.getElementById("searchInput");
    const filter = input.value.toUpperCase();
    const table = document.getElementById("tabelPengajuan");
    const tr = table.getElementsByTagName("tr");

    for (let i = 1; i < tr.length; i++) {
      let visible = false;
      const tds = tr[i].getElementsByTagName("td");
      for (let j = 0; j < tds.length; j++) {
        if (tds[j] && tds[j].innerText.toUpperCase().indexOf(filter) > -1) {
          visible = true;
          break;
        }
      }
      tr[i].style.display = visible ? "" : "none";
    }
  }

  // 🔥 EXPORT TO EXCEL FUNCTION
  async function exportToExcel() {
    try {
      // Fetch raw data from API
      const res = await fetch(`${API_URL}/pengajuan/admin/list`);
      const data = await res.json();
      
      if (data.length === 0) {
        alert("⚠️ Tidak ada data untuk diekspor!");
        return;
      }
      
      // Transform data untuk Excel
      const excelData = data.map((item, index) => ({
        'No': index + 1,
        'Tanggal Pengajuan': new Date(item.tanggal).toLocaleDateString('id-ID', {
          day: 'numeric',
          month: 'long',
          year: 'numeric'
        }),
        'Nomor Surat': item.nomor_surat || '-',
        'Nama Pemohon': toTitleCase(item.nama),
        'NIK': item.nik.replace(/(\d{4})(\d{4})(\d{4})(\d{4})/, '$1-$2-$3-$4'),
        'Alamat': item.alamat,
        'Jenis Surat': item.jenis_surat,
        'Keperluan': item.keperluan || '-',
        'Status': 'Selesai'
      }));
      
      // Create workbook dan worksheet
      const wb = XLSX.utils.book_new();
      const ws = XLSX.utils.json_to_sheet(excelData);
      
      // Set column widths
      ws['!cols'] = [
        { wch: 5 },   // No
        { wch: 20 },  // Tanggal
        { wch: 25 },  // Nomor Surat
        { wch: 30 },  // Nama
        { wch: 20 },  // NIK
        { wch: 35 },  // Alamat
        { wch: 30 },  // Jenis Surat
        { wch: 30 },  // Keperluan
        { wch: 10 }   // Status
      ];
      
      // Style header row
      const range = XLSX.utils.decode_range(ws['!ref']);
      for (let C = range.s.c; C <= range.e.c; ++C) {
        const address = XLSX.utils.encode_col(C) + "1";
        if (!ws[address]) continue;
        ws[address].s = {
          font: { bold: true, color: { rgb: "FFFFFF" } },
          fill: { fgColor: { rgb: "1e3a8a" } },
          alignment: { horizontal: "center", vertical: "center" },
          border: {
            top: { style: "thin", color: { rgb: "000000" } },
            bottom: { style: "thin", color: { rgb: "000000" } },
            left: { style: "thin", color: { rgb: "000000" } },
            right: { style: "thin", color: { rgb: "000000" } }
          }
        };
      }
      
      // Add worksheet to workbook
      XLSX.utils.book_append_sheet(wb, ws, "Data Pengajuan");
      
      // Generate filename dengan timestamp
      const now = new Date();
      const timestamp = now.toISOString().slice(0, 19).replace(/[:-]/g, '').replace('T', '_');
      const filename = `Laporan_Pengajuan_Surat_${timestamp}.xlsx`;
      
      // Download file
      XLSX.writeFile(wb, filename);
      
      // Show success message
      alert(`✅ Excel berhasil didownload!\n\n📁 File: ${filename}\n📊 Total Data: ${data.length} baris`);
      
    } catch (err) {
      console.error("Export error:", err);
      alert("❌ Gagal export Excel. Pastikan server sudah berjalan.");
    }
  }

  async function cetakSurat(id) {
    window.open(`${API_URL}/pengajuan/${id}/cetak`, '_blank');
  }

  async function hapusData(id) {
    if(confirm("⚠️ Apakah Anda yakin ingin menghapus data ini?\n\nData yang sudah dihapus tidak dapat dikembalikan.")) {
      try {
        const res = await fetch(`${API_URL}/pengajuan/admin/hapus/${id}`, { 
          method: 'DELETE' 
        });
        
        if (res.ok) {
          alert("✅ Data berhasil dihapus");
          loadData(); // Reload data
        } else {
          alert("❌ Gagal menghapus data");
        }
      } catch (err) {
        alert("❌ Terjadi kesalahan saat menghapus data");
        console.error(err);
      }
    }
  }

  // Load data saat pertama kali buka halaman
  loadData();
</script>
</body>
</html>
